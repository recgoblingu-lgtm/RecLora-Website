<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - RecLora</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-form { display: flex; flex-direction: column; gap: 1rem; max-width: 500px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea { padding: 0.75rem; background: #2A2A2A; border: 1px solid #333; border-radius: 8px; color: white; }
        .form-group textarea { resize: vertical; min-height: 150px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">RecLora</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="download.html" class="nav-link">Download</a></li>
                <li><a href="news.html" class="nav-link">News</a></li>
                <li><a href="roadmap.html" class="nav-link">Roadmap</a></li>
                <li><a href="faq.html" class="nav-link">FAQ</a></li>
                <li><a href="team.html" class="nav-link">Team</a></li>
                <li><a href="contact.html" class="nav-link active">Contact</a></li>
            </ul>
        </div>
    </nav>
    <main class="container">
        <h1>Contact Us</h1>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem;">
            <div class="card">
                <h2>Get in Touch</h2>
                <p style="color: #aaa; margin-bottom: 1rem;">Join our Discord community or email us.</p>
                <a href="https://discord.gg/bJBuP4hwXz" class="btn btn-primary" target="_blank">Join Discord</a>
            </div>
            <div class="card">
                <h2>Send Message</h2>
                <form class="contact-form" onsubmit="alert('Thank you for your message!'); return false;">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send</button>
                </form>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p>&copy; 2026 RecLora. <a href="https://discord.gg/bJBuP4hwXz" target="_blank">Discord</a></p>
    </footer>
</body>
</html>
