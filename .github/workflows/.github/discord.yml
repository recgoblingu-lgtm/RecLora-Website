name: Discord Commit Notifications

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"
          AUTHOR="${{ github.actor }}"
          BRANCH="${GITHUB_REF##*/}"
          REPO="${{ github.repository }}"

          curl -H "Content-Type: application/json" \
          -d "{
            \"embeds\": [{
              \"title\": \"🚀 New Commit Pushed\",
              \"description\": \"A new commit was pushed to **$REPO**\",
              \"color\": 8071167,
              \"fields\": [
                {
                  \"name\": \"👤 Developer\",
                  \"value\": \"$AUTHOR\",
                  \"inline\": true
                },
                {
                  \"name\": \"🌿 Branch\",
                  \"value\": \"$BRANCH\",
                  \"inline\": true
                },
                {
                  \"name\": \"📁 Repository\",
                  \"value\": \"$REPO\",
                  \"inline\": false
                },
                {
                  \"name\": \"📝 Commit Message\",
                  \"value\": \"$COMMIT_MSG\",
                  \"inline\": false
                }
              ],
              \"thumbnail\": {
                \"url\": \"https://raw.githubusercontent.com/recgoblingu-lgtm/RecLora-Website/main/IMG_6471-removebg-preview.png\"
              },
              \"footer\": {
                \"text\": \"RecLora Development\"
              },
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }],
            \"components\": [{
              \"type\": 1,
              \"components\": [{
                \"type\": 2,
                \"style\": 5,
                \"label\": \"🔗 View Commit\",
                \"url\": \"$COMMIT_URL\"
              }]
            }]
          }" \
          "$WEBHOOK"
